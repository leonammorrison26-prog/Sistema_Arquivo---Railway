name: Daily Seed Backup

on:
  schedule:
    - cron: "20 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: curl, pdo_sqlite, sqlite3
          coverage: none

      - name: Build backup from Supabase
        run: php tools/backup_from_supabase.php

      - name: Commit updated seed
        shell: bash
        run: |
          if git diff --quiet -- storage/seed_backup.sqlite; then
            echo "Seed backup unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add storage/seed_backup.sqlite
          git commit -m "Atualiza backup diario do seed"
          git push
